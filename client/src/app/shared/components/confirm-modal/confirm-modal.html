<div class="modal-backdrop" (click)="onCancel()">

  <div class="modal-container" (click)="$event.stopPropagation()">

    <div class="modal-header">

      <h2>
        {{ title() }}
      </h2>

    </div>

    <div class="modal-body">

      <p>
        {{ message() }}
      </p>

    </div>

    <div class="modal-footer">

      <button
        type="button"
        class="secondary-button"
        (click)="onCancel()"
      >
        {{ cancelText() }}
      </button>

      <button
        type="button"
        class="primary-button"
        (click)="onConfirm()"
      >
        {{ confirmText() }}
      </button>

    </div>

  </div>

</div>
