<div class="content-card">

<div class="form container">
<h1 class="form-tittle">
  Editar Producto
</h1>

@if (loading()) {

  <p>Cargando...</p>
}

@if (errorMessage()) {

  <p>
    {{ errorMessage() }}
  </p>
}

@if (product()) {

  <app-product-form

    mode="edit"

    [product]="product()"

    (submitForm)="updateProduct($event)"

  ></app-product-form>
}
</div>
</div>
